/* netlify.toml - Deployment configuration for the web-desktop app */
[build]
  # Change directory to the web-desktop project
  base = "apps/web-desktop"
  # Command to build the Vite app
  command = "npm run build"
  # Netlify will serve the generated files from the 'dist' folder
  publish = "apps/web-desktop/dist"

# Redirect all routes (including /admin/*) to index.html for SPA handling
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Optional environment variables (replace with your own values)
[context.production.environment]
  VITE_SUPABASE_URL = "YOUR_SUPABASE_URL"
  VITE_SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY"
